<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found | TierListr</title>
    <meta
      name="description"
      content="The page you tried to open on the TierListr website could not be found."
    >
    <meta name="theme-color" content="#111315">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="icon" href="assets/images/favicon-light.svg" media="(prefers-color-scheme: light)" type="image/svg+xml">
    <link rel="icon" href="assets/images/favicon-dark.svg" media="(prefers-color-scheme: dark)" type="image/svg+xml">
    <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body>
    <div class="page-glow" aria-hidden="true"></div>
    <main class="section error-shell">
      <div class="wrap">
        <section class="card error-card">
          <p class="eyebrow">404</p>
          <h1>This page slipped out of the tier list.</h1>
          <p>
            The link may be outdated, or the page may have moved. Head back home to jump back into
            TierListr.
          </p>
          <div class="hero-actions">
            <a class="button button-primary" href="./">Back to home</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
